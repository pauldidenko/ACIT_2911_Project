<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCIT lost and found | Account</title>
    <link rel="stylesheet" href="./css_file/style.css">
</head>
<body>
    <header class="navbar">
        <h1 class="logo"><a href="index.html" class="logo1">BCIT Lost and Found</a></h1>
        <nav class="nav-links">
            <ul class="nav-list">
                <li><a href="index.html" class="home">Home</a></li>
                <li><a href="catalog.html" class="catalog">Catalog</a></li>
                <li><a href="account.html" class="account">Account</a></li>
                <li><a href="#" id="logoutBtn" class="login">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="card">
        <div class="container"></div>
    </main>

    <script>
        document.getElementById("logoutBtn").addEventListener("click", async (event) => {
            event.preventDefault();
            try {
                await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
            } catch (_error) {
                // ignore
            }
            window.location.href = "/index.html";
        });
    </script>
</body>
</html>
