<body>
    <!-- Navigation -->
    <header class="navbar">
        <h1 class="logo"><a href="index.html" class="logo1">BCIT Lost and Found</a></h1>
        <nav class="nav-links">
            <ul class="nav-list">

        </nav>
    </header>
<!-- Main Content -->
<section class="login-section">
    <h2>Login to Your Account</h2>
    <div class="login-container">
        <form action="account.html" method="post" class="login-form">
        <div class="username-field">
            <label for="username"><b>Username:</b></label>
            <input type="text" id="username" name="usn" placeholder="Enter Username" required>
        </div>
        <div class="password-field">
            <label for="password"><b>Password:</b></label>
            <input type="password" id="password" name="psw" placeholder="Enter Password" required>
        </div>    
        <div class="login-btn-field">
            <button type="submit" class="login-btn">Login</button>
        </div>
        </form>
    </div>
</section>



    <!-- Footer -->
    <footer class="footer">
        <div class="footer-left">

            <p><a href="mailto:lost@bcit.ca">lost@bcit.ca</a></p>

        </div>
        
        <div class="footer-center">
            <h3>Address</h3>
            <p><a href="https://www.bcit.ca/">BCIT Burnaby, BC</a></p>
        </div>
