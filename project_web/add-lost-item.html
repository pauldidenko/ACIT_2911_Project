<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCIT los and found | Home</title>
    <link rel="stylesheet" href="./css_file/style.css">
    <link rel="stylesheet" href="./css_file/add-lost-item.css">

</head>

<body>
    <!-- Navigation -->
    <header class="navbar">
        <h1 class="logo"><a href="index.html" class="logo1">BCIT Lost and Found</a></h1>
        <nav class="nav-links">
            <ul class="nav-list">
                <li><a href="home.html" class="home">Home</a></li>
                <li><a href="lost.html" class="lost">Lost Items</a></li>
                <li><a href="found.html" class="found">Found Items</a></li>
                <li><a href="#" class="login">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="lost-hero">
        <div class="hero-content">
            <h1>Add Lost Item</h1>
            <p>Create a new lost item record for the catalog.</p>
        </div>
    </section>

    <section class="add-item-section">
        <form class="add-item-form" action="#" method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label for="item-name">Item Name</label>
                <input type="text" id="item-name" name="item_name" placeholder="Example: Black Wallet" required>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="">Select category</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Cards / ID">Cards / ID</option>
                    <option value="Bags & Clothing">Bags & Clothing</option>
                    <option value="Other Personal Items">Other Personal Items</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date-lost">Date Lost</label>
                <input type="date" id="date-lost" name="date_lost" required>
            </div>

            <div class="form-group">
                <label for="location">Location Lost</label>
                <input type="text" id="location" name="location" placeholder="Example: Library, SE12, Cafeteria"
                    required>
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" required>
                    <option value="Lost">Lost</option>
                    <option value="Returned">Returned</option>
                </select>
            </div>

            <div class="form-group">
                <label for="image">Upload Item Photo</label>
                <input type="file" id="image" name="item_image" accept="picture/*">
            </div>

            <div class="form-group full-width">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="5"
                    placeholder="Describe the item, color, brand, or any important details." required></textarea>
            </div>

            <div class="form-buttons full-width">
                <button type="submit" class="save-btn">Save Lost Item</button>
                <a href="lost.html" class="cancel-btn">Cancel</a>
            </div>

        </form>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <h2>Contact Us</h2>
        <p>Email: lost@bcit.ca</p>
        <p>Phone: 416-280-5555</p>
        <p>Address: BCIT, Burnaby, BC, Canada</p>
        <p>&copy; 2026 BCIT Lost and Found. All rights reserved.</p>
    </footer>
